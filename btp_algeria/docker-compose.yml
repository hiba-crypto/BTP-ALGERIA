version: '3.8'

services:
  db:
    image: postgres:15
    container_name: btp_db
    environment:
      POSTGRES_DB: btp_db
      POSTGRES_USER: btp_user
      POSTGRES_PASSWORD: btp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: btp_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: btp_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
