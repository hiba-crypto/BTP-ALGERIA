upstream btp_app {
    server unix:/run/gunicorn.sock;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

server {
    listen 80;
    server_name btp-algeria.dz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name btp-algeria.dz;

    ssl_certificate /etc/letsencrypt/live/btp-algeria.dz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btp-algeria.dz/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https://ui-avatars.com; font-src 'self' https://cdnjs.cloudflare.com;" always;

    access_log /var/log/nginx/btp_access.log;
    error_log /var/log/nginx/btp_error.log;

    location /static/ {
        alias /home/btp/app/static_root/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /home/btp/app/media_root/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        limit_req zone=one burst=20 nodelay;
        include proxy_params;
        proxy_pass http://btp_app;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }
}
