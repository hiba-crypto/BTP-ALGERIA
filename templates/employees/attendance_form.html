{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Présences - BTP Algeria{% endblock %}
{% block page_title %}Saisie des Présences{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary"><i class="fas fa-clock me-2"></i>Pointer un employé</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Valider Présence</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
