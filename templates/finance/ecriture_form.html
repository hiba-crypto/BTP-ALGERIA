{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Saisie Écriture Comptable - BTP Algeria{% endblock %}
{% block page_title %}Nouvelle Écriture Comptable{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow mb-4 glass-card">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Détails de l'écriture</h6>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'ecriture_list' %}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
