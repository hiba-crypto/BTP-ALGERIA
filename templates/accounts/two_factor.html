{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Authentification à deux facteurs - BTP Algeria{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white text-center py-4 border-0">
                <i class="fas fa-shield-alt text-primary fa-3x mb-3"></i>
                <h4 class="fw-bold">Vérification de sécurité</h4>
                <p class="text-muted small">Ce compte est protégé par l'authentification à deux facteurs.</p>
            </div>
            <div class="card-body px-5 pb-5 pt-0">
                <form method="post" action="{% url 'two_factor_verify' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3 fw-bold">
                        Vérifier <i class="fas fa-check ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
