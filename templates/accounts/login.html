<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | BTP Algeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1B3A6B 0%, #0D1E3A 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo i {
            font-size: 48px;
            color: #1B3A6B;
        }
        .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: #1B3A6B;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-primary {
            background-color: #1B3A6B;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #F8B400;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="login-card animated-fade-in">
        <div class="brand-logo">
            <i class="fas fa-city"></i>
            <div class="brand-name">BTP <span style="color: #F8B400;">Algeria</span></div>
        </div>
        
        <h5 class="text-center mb-4">Portail Collaborateur</h5>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control border-start-0 bg-light" placeholder="Entrez votre identifiant" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Se Connecter</button>
            </div>
        </form>
        
        <div class="text-center mt-4 text-muted small">
            &copy; 2026 BTP Algeria | Sécurisé par AES-256
        </div>
    </div>
</body>
</html>
