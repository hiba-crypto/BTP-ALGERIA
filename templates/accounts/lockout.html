{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-danger">Compte Verrouillé</h2>

            </div>
        </div>
    </div>
</div>
{% endblock %}
