{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Projet - BTP Algeria{% endblock %}
{% block page_title %}Création / Modification Projet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary"><i class="fas fa-project-diagram me-2"></i>Fiche Projet</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% crispy form %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
