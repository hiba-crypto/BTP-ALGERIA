{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Bon de Réception - BTP Algeria{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white py-3">
                    <h5 class="mb-0">Réception de Marchandises</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-4 d-flex justify-content-between">
                            <a href="{% url 'bon_commande_list' %}" class="btn btn-outline-secondary">Annuler</a>
                            <button type="submit" class="btn btn-success">Enregistrer la Réception</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
