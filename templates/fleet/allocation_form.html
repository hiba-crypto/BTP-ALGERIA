{% extends "base.html" %}

{% block title %}Allouer un Engin - {{ projet.reference }} - BTP Algeria{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'projet_list' %}">Projets</a></li>
            <li class="breadcrumb-item"><a href="{% url 'projet_detail' projet.pk %}">{{ projet.reference }}</a></li>
            <li class="breadcrumb-item active">Allouer un Engin</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow mb-4 glass-card">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">
                        <i class="fas fa-truck-pickup me-2"></i>Allouer un Engin/Matériel au Projet {{ projet.reference }}
                    </h6>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Sélectionner un Engin disponible</label>
                            <select name="engin" class="form-select" required>
                                <option value="">-- Choisir un engin --</option>
                                {% for e in engins %}
                                <option value="{{ e.pk }}">{{ e.code }} - {{ e.designation }} ({{ e.marque }} {{ e.modele }}) - {{ e.get_etat_display }}</option>
                                {% empty %}
                                <option disabled>Aucun engin disponible</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date de début d'allocation</label>
                                <input type="date" name="date_debut" class="form-control" value="{% now 'Y-m-d' %}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Taux journalier (DZD)</label>
                                <input type="number" name="taux_journalier_dzd" class="form-control" value="15000" min="0" step="1000" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <a href="{% url 'projet_detail' projet.pk %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-link me-1"></i>Allouer l'Engin
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
