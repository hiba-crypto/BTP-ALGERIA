<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification 2FA | BTP Algeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1B3A6B 0%, #0D1E3A 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .brand-logo i { font-size: 40px; color: #1B3A6B; }
        .btn-primary { background-color: #1B3A6B; border: none; padding: 12px; font-weight: 600; }
        .form-control { border-radius: 10px; padding: 12px; text-align: center; font-size: 1.5rem; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo mb-3">
            <i class="fas fa-shield-alt"></i>
            <h4 class="mt-3 fw-bold">Double Authentification</h4>
        </div>
        
        <p class="text-muted small">Ouvrez votre application d'authentification et entrez le code à 6 chiffres.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <input type="text" name="code" class="form-control" maxlength="6" pattern="\d{6}" placeholder="000000" autofocus required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Vérifier le code</button>
            </div>
        </form>
    </div>
</body>
</html>
