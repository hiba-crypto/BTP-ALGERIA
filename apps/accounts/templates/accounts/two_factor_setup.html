{% extends "base.html" %}

{% block title %}Configuration 2FA - BTP Algeria{% endblock %}

{% block content %}
<div class="row justify-content-center animated-fade-in">
    <div class="col-md-6">
        <div class="card shadow glass-card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Activer la Double Authentification (2FA)</h5>
            </div>
            <div class="card-body text-center p-5">
                <p class="mb-4">Scannez ce QR Code avec une application comme <strong>Google Authenticator</strong> ou <strong>Authy</strong>.</p>
                
                <div class="mb-4 p-3 bg-white d-inline-block rounded shadow-sm">
                    <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code 2FA">
                </div>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="mb-3 w-50 mx-auto">
                        <label class="form-label fw-bold small">Code de vérification</label>
                        <input type="text" name="code" class="form-control text-center" maxlength="6" placeholder="000000" required>
                    </div>
                    <div class="d-grid gap-2 w-50 mx-auto">
                        <button type="submit" class="btn btn-primary">Activer maintenant</button>
                        <a href="{% url 'profile' %}" class="btn btn-light">Plus tard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
