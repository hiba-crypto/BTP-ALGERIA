{% extends "base.html" %}

{% block title %}Tableau de Bord RH - BTP Algeria{% endblock %}

{% block content %}
<div class="d-sm-flex align-items-center justify-content-between mb-4 animated-fade-in">
    <h1 class="h3 mb-0 text-gray-800 fw-bold">Gestion des Ressources Humaines</h1>
</div>

<div class="row animated-fade-in">
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card kpi-card shadow h-100 py-2 glass-card">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="card-title mb-1">Effectif Total</div>
                        <div class="kpi-value">{{ effectif_total }} Employés</div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-users fa-2x text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
